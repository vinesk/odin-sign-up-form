<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Metas -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Roboto:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- Links -->
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Title -->
    <title>Odin - Sign-up Form</title>
  </head>
  <body>
    <div class="left">
      <div class="banner">
        <img src="./img/logo.png" alt="Odin logo" />
        <h1>Odin</h1>
      </div>
      <div class="copyright">
        Photo by
        <a href="https://unsplash.com/@haliewestphoto" target="_blank"
          >Halie West</a
        >
        on <a href="https://unsplash.com/" target="_blank">Unsplash</a>
      </div>
    </div>
    <div class="right">
      <div class="description">
        <p>
          This is not a real service! You know you need something like this in your life to help you realize your deepest dreams.<br>
          Sign up now to get started.
        </p>
        <p>You know you want to.</p>
      </div>
      <div class="form">
        <form action="#" method="post">
          <h2>Let's do this!</h2>
          <div class="form-row">
            <div class="form-col">
              <label for="first-name">First name</label>
              <input type="text" name="first-name" id="first-name" />
            </div>
            <div class="form-col">
              <label for="last-name">Last name</label>
              <input type="text" name="last-name" id="last-name" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label for="email">Email</label>
              <input type="email" name="email" id="email" />
            </div>
            <div class="form-col">
              <label for="phone-number">Phone number</label>
              <input type="tel" name="phone-number" id="phone-number" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label for="password">Password</label>
              <input type="password" name="password" id="password" />
            </div>
            <div class="form-col">
              <label for="confirm-password">Confirm password</label>
              <input
                type="password"
                name="confirm-password"
                id="confirm-password"
              />
            </div>
          </div>
        </form>
      </div>
      <div class="subscription">
        <button type="submit">Create account</button>
        <p>Already have an account? <a href="#">Log in</a></p>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
